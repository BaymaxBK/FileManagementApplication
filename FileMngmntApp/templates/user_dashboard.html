{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">User Dashboard</h3>
        <span class="text-muted">Welcome, {{ request.user.username }}</span>
    </div>

    <!-- Summary Cards -->
    <div class="row g-3">

        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6 class="text-muted">My Tasks</h6>
                    <h3>{{ my_tasks_count }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6 class="text-muted">Pending Tasks</h6>
                    <h3>{{ pending_tasks }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6 class="text-muted">Completed Tasks</h6>
                    <h3>{{ completed_tasks }}</h3>
                </div>
            </div>
        </div>

    </div>


</div>

{% endblock %}
