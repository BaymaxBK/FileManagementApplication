{% extends "base.html" %}
{% load static %}

{% block title %}Assingned Tasks{% endblock %}

    
{% block content %}
    
    <style>
        
        .rc-handle {
            width: 8px;
            cursor: col-resize;
            z-index: 10000 !important;
            /* pointer-events: auto !important; */
        }
        
        
        #dataTable th,
        #dataTable td {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 0;
        }
        
                
        .dataTables_scrollHead table,
        .dataTables_scrollBody table {
            table-layout: auto !important;
            width: max-content !important;
            
            /* margin-left: 0 !important; */
        }
        .dataTables_scrollBody {
            overflow-x: auto !important;
        }

       .dataTables_scrollHeadInner {
            width: max-content !important;
            margin: 0 auto !important;
        }

        .dataTables_scrollBody table {
            margin: 0 auto !important;
        }
    

        #tableFilters {

            overflow-y: visible;
        }

        #tableFilters table {
            width: max-content;

        }

            background: #f8f9fa;
            padding: 2px;
        }

        /* Dropdown Styles */
         .filter-dropdown {

            display: none; 
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            z-index: 1055;

            /* background-color: pink !important; */

            border: 1px solid #ddd;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);

            min-width: 170px;
            max-height: 320px;

           
            flex-direction: column;

           
        }

        .checkbox-list > div {
            display: flex;
            align-items: flex-start;
            font-size: 13px;
            
            /* gap: 6px; */
            /* padding: 0 4px; */
            white-space: nowrap;
        }
        .checkbox-list input{
            margin-top: 4px;   
        }


        .apply-clear-buttons {
            
            position: sticky;
            bottom: 0;
            background: #fff;
            padding: 8px 6px;

            display: flex;
            justify-content: flex-end;
            gap: 6px;

            border-top: 1px solid #eee;

            /* background: red !important;
            border: 5px solid blue !important; */
            
            /* border-top: 1px solid #eee; 
            margin-top: 5px;
            padding-top: 5px;
            display: flex;
            justify-content: flex-end;
            gap: 5px; */
        }

        .select-all-wrapper {
            position: sticky;
            top: 0;
            background: #fff;
            padding:10px 35px;
            border-bottom: 1px solid #eee;
            z-index: 1;
            width: 100%;
        }
        
        .select-all-wrapper label {
            display: inline-flex;
            justify-content: center ;
            align-items: center;
            gap: 6px;
            white-space: nowrap;               
            font-size:17px;
            /* background-color: green; */
            /* padding: 0 13px;                 */
            margin: 0;
            
            line-height: 1;
        }
        
        .select-all-wrapper input[type="checkbox"] {
            margin: 0;
            width: 10px;
        }

        
        .filter-dropdown .checkbox-list {
            /* flex: 1; */
            
            overflow-y: auto; 
            padding: 6px 0px;
        }

        .filter-btn {
            position: relative;
            background: #fff;
            border: 1px solid #ced4da;
            font-size: 14px;
            padding: 10px 5px;
            border-radius: 5px;
            /* width: 100%; */

            text-align:left;
        }

        .filter-btn i {
            float:right;
        }

        .filter-dropdown .form-check {

        }



        #columnSelector .form-check {

            /* margin-right: 40px; */
        }

        
        .editable-cell {
            outline: none;
        }
        .editable-cell-updated {
            background: #d4edda !important;
            transition: 0.5s;
        }
            
    </style>

    <div class="d-flex justify-content-between align-items-center  mb-2" >

    <div id="taskDivId" class="border py-2 rounded flex-center mb-2" style="display:none;">

                <label for="rowLimit" class="form-label px-3">TaskName</label>

    <table id="dataTable" class="table table-striped table-bordered table-hover w-100" style="width:100%">

            <tr id="headerRow">
                <!-- Column headers will load dynamically -->
            </tr>
            <!-- <tr id="excelFilterRow"></tr> 
             <tr id="filterRow" class="mb-3"></tr> -->
        </thead>
              
    </table>

<script>

        let table;
        window.selectedRowIds = [];   // ✅ Declare here (global)

        function disableEditUI() {
            console.log("Disable Edit Feature Triggered !");
            $('.editable-cell').removeAttr('contenteditable');
            $('.delete-row-btn').hide();
            $('#deleteSelectedRows').hide();
            $('#toggleTaskBtn').hide();
            // $('#selectAllBtn').hide();
        }
        
        function getCookie(name){
            
                let cookieValue = null;
                if ( document.cookie && document.cookie != '' ){
                        let cookies=document.cookie.split(";");
                        for (let cookie of cookies) {
                            cookie = cookie.trim();
                            if (cookie.startsWith(name + "=")) {
                                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                                break;
                            }
                        }
                }
                console.log("Cookie value :"+cookieValue)
                return cookieValue; 
            
        }

        // AJAX SETUP
        $.ajaxSetup({
            headers: {
                "X-CSRFToken": getCookie("csrftoken")
            }
        });

        function showToast(message, isSuccess = true) {
            const toastEl = $("#taskToast");
            const toastBody = toastEl.find(".toast-body");

            toastBody.html(message);

            toastEl
                .removeClass("bg-success bg-danger")
                .addClass(isSuccess ? "bg-success" : "bg-danger");

            const toast = new bootstrap.Toast(toastEl[0]);
            toast.show();
        }


        
        function setupColWiseFilterDropdownHandlers() {

                $(document).on('change', '.select-all-checkbox', function () {

                        const isChecked = $(this).is(':checked');

                        // Find THIS dropdown only
                        const dropdown = $(this).closest('.filter-dropdown');

                        // Check / uncheck all column checkboxes inside this dropdown
                        dropdown.find('.checkbox-list input[type="checkbox"]')
                                .prop('checked', isChecked);
                });

        // all the delegated event handlers go here (the block above)
        // ✅ Dropdown toggle handler
            $(document).on('click', '.filter-btn', function (e) {
                e.stopPropagation();
                console.log("Filter BUtton Even Triggered !");
                
                const col = $(this).data('col');
                const dropdown = $(`.filter-dropdown[data-col="${col}"]`);

                // let dropdown = $(this).siblings('.filter-dropdown');
                
                // close others
                $('.filter-dropdown').not(dropdown).hide();
                let offset = $(this).offset();

                dropdown.appendTo('body').css({
                    position: 'absolute',
                    top: offset.top + $(this).outerHeight(),
                    left: offset.left,
                    display: 'flex',
                    zIndex: 2000
                });
                
                // console.log("Total FIlter ",$('.filter-dropdown').length)
                 
                // $('.filter-dropdown').hide();
                
                // $(this).siblings('.filter-dropdown').css('display', 'flex');
                
                
            });
                
            // ✅ Hide dropdowns when clicking outside
            $(document).on('click', function () {
                $('.filter-dropdown').hide();
            });
        
            // ✅ Prevent closing dropdown on inside click
            $(document).on('click', '.filter-dropdown', function (e) {
                e.stopPropagation();
            });

                    
            // ✅ Apply filter
            $(document).on('click', '.apply-filter', function () {

                
                const dropdown = $(this).closest('.filter-dropdown');
                const col = dropdown.data('col');
                const icon = $(`.filter-btn[data-col="${col}"]`).find('.filter-icon');

            

                const checkboxes = dropdown.find('.column-filter');
                const colIndex = checkboxes.first().data('col-index')
                const selected = checkboxes.filter(':checked').map(function () {
                                            return $(this).val();
                                }).get();

                console.log("Selected Items :",selected," COlumn in Index: ",colIndex);
                const regex = selected.length ? '^(' + selected.join('|') + ')$' : '';
                table.column(colIndex).search(regex, true, false).draw();

                if (selected.length > 0) {
                    icon.removeClass('bi-funnel').addClass('bi-funnel-fill text-primary');
                }

                dropdown.hide();
            });

            
            //  Clear Seleted Filter 
            $(document).on('click', '.clear-filter', function () {

                const dropdown = $(this).closest('.filter-dropdown');
                dropdown.find('.checkbox-list input[type="checkbox"]')
                                .prop('checked', false);

                const col = dropdown.data('col');
                const icon = $(`.filter-btn[data-col="${col}"]`).find('.filter-icon');

                // const wrapper = dropdown.closest('.filter-wrapper');
                // const icon = wrapper.find('.filter-icon');

                const checkboxes = dropdown.find('.column-filter');
                const colIndex = checkboxes.first().data('col-index');
                checkboxes.prop('checked', false);
                table.column(colIndex).search('').draw();

                icon.removeClass('bi-funnel-fill text-primary').addClass('bi-funnel');

                dropdown.hide();
            });

        }


        $(document).on('click','#clearAllFilters', function () {

                console.log("Clear Filter All Filter Event Trigger's ")
                // 1️⃣ Clear DataTable filters
                table.search('').columns().search('').draw();

                // 2️⃣ Uncheck all dropdown checkboxes
                $('.filter-dropdown .column-filter').prop('checked', false);

                // 3️⃣ Reset all filter icons
                $('.filter-icon')
                    .removeClass('bi-funnel-fill text-primary')
                    .addClass('bi-funnel');
        });

        

        $(document).on("click", "#AssingId", function () {

            const taskName = $("#taskName").val().trim();
            const assignedUser = $("#userSelect").val();
            const selectedIds = window.selectedRowIds || [];

            // ✅ Basic validations
            if (!taskName) {
                alert("Please enter Task Name");
                return;
            }
        
            if (!assignedUser) {
                alert("Please select user");
                return;
            }
        
            if (selectedIds.length === 0) {
                alert("Please select at least one row");
                return;
            }
            
            console.log("Selected row AssignTask: > ",window.selectedRowIds.join(","))
            $.ajax({

                    url: "{% url 'create_task' %}",
                    type: "POST",
                    data: {
                        taskName: taskName,
                        assignedUser: assignedUser,
                        rowIds: window.selectedRowIds.join(","), // stringify
                        tableID: "{{ table.id }}"
                    },
                    success: function (res) {

                        showToast(res.message, res.success);

                        if (res.success) {
                            $("#taskName").val("");
                            $("#userSelect").val("");
                        }
                    },
                    error: function () {
                        showToast("Server error occurred", false);
                    },
                    complete: function () {
                        // 🔄 Hide spinner
                        $("#assignSpinner").addClass("d-none");
                        $("#AssingId").prop("disabled", false);
                    }

            });

        });

        $(document).on("click", "#selectAllBtn", function () {

            let isSelectMode = $(this).text().trim() === "Select All";

            if (isSelectMode) {
                $(this).text("Unselect All")
                       .removeClass("btn-outline-success")
                       .addClass("btn-success");
            
                // select all visible
                $("#dataTable tbody .select-row-btn").each(function () {
                    const rowId = $(this).data("id");
                
                    if (!window.selectedRowIds.includes(rowId)) {
                        window.selectedRowIds.push(rowId);
                    }
                
                    $(this)
                        .removeClass("btn-outline-success")
                        .addClass("btn-success")
                        .html(`<i class="bi bi-check-lg"></i>`);
                });
            }
            else {
                $(this).text("Select All")
                       .removeClass("btn-success")
                       .addClass("btn-outline-success");
            
                // unselect all visible
                $("#dataTable tbody .select-row-btn").each(function () {
                    const rowId = $(this).data("id");
                
                    window.selectedRowIds = window.selectedRowIds.filter(id => id !== rowId);
                
                    $(this)
                        .removeClass("btn-success")
                        .addClass("btn-outline-success")
                        .text("Select");
                });
            }
            
            updateSelectionCount();
            console.log("Selected IDs:", window.selectedRowIds);
        });


        // VIEW ROW BUTTON EVENT
        $(document).on("click", ".view-row-btn", function () {
            
            //alert("View Buttton Clicked !!");
            const rowId = $(this).data('id');
            const tableName ="{{ table.table_name }}"// add table name in HTML
            // const html=$(this).html();

            // console.log(`VIEW HTML CLICK > ${html}`);
            // console.log("( View Button ): Table Name :",tableName,"RowId ",rowId);

            window.location.href = `/table_data/view_row_data/${tableName}/${rowId}/`; //

        });

        
        // DELETE ROW BUTTON EVENT 
        $(document).on("click",".delete-row-btn",function(){

            console.log(`This is> ${ $(this).html() }`);

            const rowId = $(this).data('id');
            const confirmation=confirm('Are you sure you want to delete this row ?')

            console.log(`DELETE BUTTON Row Id :> ${rowId} DELETE CONFIRMATION : ${confirmation} `)   
                
                if (rowId > 0 && confirmation) {
                    // Existing DB row - send delete to backend
                    $.ajax({

                        url:"{% url 'delete_table_row' table_name=table.table_name %}",
                        method:"POST",
                        data:JSON.stringify({ id: rowId }),
                        success: function(res){
                            console.log("Row Deleted Succesfully!");
                        },
                        error: function(res){
                            alert("Filed to Delete the Row !");
                        }

                    });
                    $(this).closest('tr').remove();
                }

        });
        
        // EVENT FOR DELETE THE 'SELECTED ROWS'
        $(document).on('click', '#deleteSelectedRows', function () {
    
                if (window.selectedRowIds.length === 0) {
                    alert('Please select at least one row');
                    return;
                }
            
                if (!confirm(`Delete ${window.selectedRowIds.length} selected rows?`)) {
                    return;
                }
            
                $.ajax({
                    url: "{% url 'adminViewdata_deleteSeleted_rows' table_name=table.table_name %}", // Django delete endpoint
                    type: 'POST',
                    data: {
                        ids: window.selectedRowIds,
                    },
                    success: function (response) {

                        window.selectedRowIds.length = 0;
                        updateSelectionCount();
        
                        table.ajax.reload(null, true);

                        console.log("Selected IDs After Selected Deleted Button : ", window.selectedRowIds);
                        table.draw(false); // redraw without page reset
                    },

                    error: function () {
                        alert('Delete failed');
                    }
                });
        });
        



        // EVENT DELGATION FOR DELETE BUTTON
        document.addEventListener('click', function(event) {

            if (event.target.classList.contains('delete-row-btn')) {    

                
                const rowId = row.getAttribute('row-id');
                const confirmation=confirm('Are you sure you want to delete this row?')
                if (rowId > 0 && confirmation) {
                    // Existing DB row - send delete to backend
                    fetch("{% url 'delete_table_row' table_name=table.table_name %}", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: JSON.stringify({ id: rowId })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            row.remove();
                        } else {
                            alert('Failed to delete row.');
                        }
                    });
                } if(confirmation){
                
                    // New row (just remove from DOM)
                    row.remove();
                }
            }
        });
        
        function updateSelectionCount(){

            const count_lable=$("#SelCountId");
            count_lable.text(`Count : ${selectedRowIds.length}`);

        }

$(document).ready(function() {
            
            const tableId = "{{ table.id }}";
            
            // const allColumns=JSON.parse('{{ columns|safe|escapejs }}');

            let allColumns = [];
            let selectedColumns = [];


            $.ajax({
                
                url: `/table_data_datatable/${tableId}/data/`,
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    init: true
                }),
                success: function (json) {
                
                    console.log("InitData", json);
                
                    // Columns from backend
                    allColumns = json.columns;
                    allColumns.push("Action");
                
                    selectedColumns = [...allColumns];
                
                    // Build column selector UI
                    allColumns.forEach(col => {
                        $('#columnSelector').append(`
                            <div class="form-check form-check-inline">
                                <input class="form-check-input column-toggle"
                                       type="checkbox"
                                       value="${col}"
                                       id="chk_${col}"
                                       checked>
                                <label class="form-check-label" for="chk_${col}">
                                    ${col}
                                </label>
                            </div>
                        `);
                    });
                
                    // 🚀 Now initialize DataTable
                    if ($.fn.DataTable.isDataTable('#dataTable')) {
                        $('#dataTable').DataTable().destroy();
                    }
                    renderTable();

                },
                error: function (xhr) {
                    console.error("Init failed", xhr.responseText);
                }

            });

        
            
            $('#applyColumns').on('click', function() {
                        
                        selectedColumns = $('.column-toggle:checked').map(function() {
                            return $(this).val();
                        }).get();


                        if ($.fn.DataTable.isDataTable('#dataTable')) {
                                // const table = $('#dataTable').DataTable();
                                //  table.clear().destroy(false);  // 🔥 destroy column resize firstconst
                                dt = $('#dataTable').DataTable();

                                try {
                                    $('#dataTable').resizableColumns('destroy');
                                } catch(e) {}
                                
                                dt.clear().destroy(false);
                                // const dt = $('#dataTable').DataTable();
                                // dt.destroy(true);   // 🔥 completely removes DT wrapper
                        }
                        
                        $('#dataTable thead').empty();
                        $('#excelFilterRow').empty();
                        $('#filterRow').empty();
                        
                         // Remove old header
                        renderTable();

                    
            });

            
            
            // SET THE EVENT HANDLERS FOR COLUM WISE FILTER DROPDOWN AND TEXT BOX'S 
            setupColWiseFilterDropdownHandlers();

            // SHOW/HIDE Display Column Button
            $("#toggleColumnSelector").on("click", function () {        
                const btn = $(this);

                $("#columnSelectorWrapper").slideToggle(300, function () {
                    if ($(this).is(":visible")) {
                        btn.text("Hide");
                    } else {
                        btn.text("Show");
                    }
                });
            });


            $('#ShowSelRowBtn').on("click",function(){
                
                selectedColumns = $('.column-toggle:checked').map(function() {
                    return $(this).val();
                }).get()

                if ($.fn.DataTable.isDataTable('#dataTable')) {
                        $('#dataTable').DataTable().clear().destroy();
                        $('#dataTable thead').empty(); // ✅ important
                }
                
                console.log("Show button Text > "+$(this).text());
                if ($(this).text() === "Show"){
                    renderTable();
                    $(this).text("Show All");

                }
                else{
                    renderTable();
                    $(this).text("Show");
                    
                }
                
                console.log("Table Reders !");
            });


            let isResizing = false;

            // detect resize start
            $(document).on('mousedown', '.rc-handle', function () {
                isResizing = true;
            });

            // detect resize end
            $(document).on('mouseup', function () {
            
                if (!isResizing) return;
            
                console.log("<< Resize finished >>");

                    $('.dataTables_scrollHead th').each(function (i) {
                    
                        let w = $(this).outerWidth();
                        // $(this).css('width','180px');

                        console.log("Column", i, "Width:", w);

                        // Sync header colgroup
                        $('.dataTables_scrollHead colgroup col').eq(i).css('width', 10 + w + 'px');

                        // Sync body colgroup
                        $('.dataTables_scrollBody colgroup col').eq(i).css('width', w + 'px');

                        // ⭐ Sync body cells directly (important)
                        $('.dataTables_scrollBody td:nth-child(' + (i+1) + ')').css('width', w + 'px');

                        // let headCol = $('.dataTables_scrollHead colgroup col').eq(i);
                        // let bodyCol = $('.dataTables_scrollBody colgroup col').eq(i);

                        // console.log("Head Col Exists:", headCol.length);
                        // console.log("Body Col Exists:", bodyCol.length);

                        // headCol.css('width', w + 'px');
                        // bodyCol.css('width', w + 'px');
                        
                    
                    });
                
                    setTimeout(function(){
                        table.columns.adjust().draw(false);
                        syncFilterWidths();
                    }, 50);
                
                    isResizing = false;
            
            });

            

                    function syncFilterWidths() {
                        console.log("<< Sync Filter width funtion work !>>")
                           $('.dataTables_scrollHead thead tr:first th').each(function (i) {
                            const w = $(this).outerWidth();

                            $('#excelFilterRow th').eq(i).css({
                                width: w + 'px',
                                minWidth: w + 'px',
                                maxWidth: w + 'px'
                            });
                        
                            $('#filterRow th').eq(i).css({
                                width: w + 'px',
                                minWidth: w + 'px',
                                maxWidth: w + 'px'
                                });
                            });
                    }

                    
                        function enableResize() {
                            
                            console.log("enableResize called");
                            const headTable = $('.dataTables_scrollHead table');
                            
                            console.log("Head table:", headTable.length);
                            if (headTable.data('resizableColumns')) {
                                headTable.resizableColumns('destroy');
                            }
                        
                            headTable.resizableColumns({
                                selector: 'thead tr:first th',
                                store: false
                            });
                        
                        }

                
            
            
            function renderTable(){

                if ($.fn.DataTable.isDataTable('#dataTable')) {
                    const dt = $('#dataTable').DataTable();
                    dt.clear();
                    dt.destroy(true); // 🔥 VERY IMPORTANT
                }

                console.log("Render Table Work !"); 
                $('#headerRow, #filterRow ,#excelFilterRow').empty();
                    
                    console.log("Selected Col in Render Table : ",selectedColumns);
                    
                    const columns=selectedColumns.map(col => {
                            if (col === "Action") {
                                return {
                                    data: null,
                                    title: "Action",
                                    width: "180px",
                                    orderable: false,
                                    searchable: false,
                                    render: function(data, type, row) {
                                        return `
                                            
                                            <button class="btn btn-sm btn-primary view-row view-row-btn" data-id="${row.id}">
                                                <i class="bi bi-eye"></i>
                                            </button>
                                            <button class="btn btn-sm btn-danger delete-row delete-row-btn" data-id="${row.id}">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                            <button class="btn btn-sm btn-outline-success select-row-btn" data-id="${row.id}">
                                                Select
                                            </button>
                                        `;
                                    }
                                };
                            }
                            else {
                                return { data: col, title: col,widht:"180px" };
                            }
                    });

                    // $('#dataTable thead').html(`
                    //     <tr id="headerRow"></tr>
                    //     <tr id="excelFilterRow"></tr>
                    //     <tr id="filterRow"></tr>
                    // `);
                    $('#dataTable thead').empty().append(`
                            <tr id="headerRow"></tr>
                            
                    `);

                    // <tr id="excelFilterRow"></tr>
                    //         <tr id="filterRow"></tr>
                    columns.forEach(col => {
                        
                        //$('#headerRow').append(`<th>${col.title}</th>`);
                        if (col.title !== "Action"){
                            
                            $('#headerRow').append(`<th>${col.title}</th>`);
                            $('#excelFilterRow').append(`
                                    <th>
                                        <div class="filter-wrapper position-relative">
                                            <button class="filter-btn" data-col="${col.title}">
                                                ${col.title}<i class="bi bi-funnel ms-1 filter-icon"></i>
                                            </button>

                                            <div class="filter-dropdown" data-col="${col.title}">
                                                
                                                <!-- Select All -->
                                                <div class="select-all-wrapper mb-2">
                                                    <label class="fw-semibold">
                                                        <input type="checkbox" class="select-all-checkbox">
                                                        Select All
                                                    </label>
                                                </div>

                                                 <!-- Checkbox list (scrollable) -->
                                                <div class="checkbox-list ms-3"></div>

                                                <!-- Fixed footer -->
                                                <div class="apply-clear-buttons">
                                                    <button class="btn btn-sm btn-primary apply-filter">Apply</button>
                                                    <button class="btn btn-sm btn-secondary clear-filter">Clear</button>
                                                </div>
                                            </div>
                                        </div>
                                    </th>
                            `);
                            $('#filterRow').append(
                                `<th><input type="text" class="form-control form-control-sm column-filter" placeholder="Search ${col.title}" /></th>`
                            );
                        }
                        else{
                            $('#headerRow').append(`<th>${col.title}</th>`);
                            $('#excelFilterRow').append(`<th class="flex-center mt-2"><button id="clearAllFilters" class="btn btn-outline-danger text-nowrap btn-sm mb-2">
    <i class="bi bi-x-circle"></i> Clear All Filters</button></th>`);
                            $('#filterRow').append(`<th class="flex-center gap-2"><button id="deleteSelectedRows" class="btn btn-sm btn-outline-danger text-nowrap">
        <i class="bi bi-trash"></i> Delete
    </button><button id="selectAllBtn" class="btn btn-sm btn-outline-success text-nowrap w-100"> Select All </button> </th>`);
                        }
                        

                    });

                    // console.log(
                    //             'AFTER HEADER BUILD → th count:',
                    //             $('#dataTable thead tr:first th').length
                    // );

                    console.log("SELECTE COLUMN'S ",selectedColumns);
                    btn_txt=$('#ShowSelRowBtn').text().trim();
                    console.log("<SELET ROW BUTTON TEXT > ",btn_txt);

                    let CAN_EDIT = false;
                    // Initialize DataTable
                setTimeout(() => {
                    table = $('#dataTable').DataTable({
                        
                        processing: true,
                        serverSide: true,

                        scrollX: true,
                        scrollCollapse: true,
                                  
                        // colResize: {
                        //     resizeTable: true,
                        //     handleWidth: 8   // IMPORTANT
                        // },
                        ajax:{ 
                            url:`/table_data_datatable/${tableId}/data/`,
                            type: "POST",
                            contentType: "application/json",

                            data: function(d) {
                                // Send selected columns to backend
                                d.selected_columns = selectedColumns.filter(col => col !== "Action");
                                d.selectedRow = btn_txt === "Show" && window.selectedRowIds ? window.selectedRowIds :'';
                                return JSON.stringify(d); 
                            },
                            dataSrc: function (json) {

                                    CAN_EDIT = json.can_edit;
                                    console.log("CAN_EDIT from AJAX:", CAN_EDIT);

                                    if (!CAN_EDIT) {
                                        disableEditUI();
                                    }
                                
                                    return json.data;
                                }           
                        },
                        columns: columns,
                        pageLength: 25,
                        lengthMenu: [ [10, 25, 50, 100, 250, 500,1000,2000,5000,-1], [10, 25, 50, 100, 250, 500,1000,2000,5000,"All"] ],
                        
                        orderCellsTop: true,
                        responsive: false,
                        autoWidth:false,
                        
                        language: {
                            searchPlaceholder: "Global search...",
                            search: "",
                        },
                        dom: "<'row mb-1'<'col-sm-6'l><'col-sm-6'f>>" +
                        "<'row mb-1'<'col-sm-12 d-flex justify-content-end'i>>" +
                        "<'row'<'col-sm-12'tr>>" +
                        "<'row mt-2'<'col-sm-12'p>>",

                        initComplete: function () {
                            
                            console.log("<<<<<<<  Initi function Executes >>>>>>>")
                            
                            $('.dataTables_scrollBody').on('scroll', function () {

                                    console.log("Scroll event triggered");
                                    const maxScroll = $('#tableFilters')[0].scrollWidth;
                                    const body = $(this);
                                    const scrollLeft = body.scrollLeft();

                                    const maxAllowed = maxScroll - body.width();

                                    setTimeout(
                                       function(params) {
                                            if (scrollLeft > maxAllowed) {
                                                body.scrollLeft(maxAllowed);
                                            }    
                                       },500 
                                    );
                                    
                                
                                    // keep header and filters synced
                                    $('.dataTables_scrollHead').scrollLeft(body.scrollLeft());
                                    $('#tableFilters').scrollLeft(body.scrollLeft());

                            });

                            /* FILTER → BODY + HEADER */
                            $('#tableFilters').on('scroll', function () {
                            
                                
                            
                                const scrollLeft = $(this).scrollLeft();
                            
                                $('.dataTables_scrollBody').scrollLeft(scrollLeft);
                                $('.dataTables_scrollHead').scrollLeft(scrollLeft);
                            
                                
                            });
                          

                            console.log("DataTable initComplete");

                            const api = this.api();
                            const columnCount = api.columns().count();
                            console.log("< Column Count colGroup:>",columnCount);
                            
                            const headTable = $('.dataTables_scrollHead table');
                            const bodyTable = $('.dataTables_scrollBody table');

                            // ---------- CREATE COLGROUP ----------
                            let colgroup = '<colgroup>';
                                
                                
                                for (let i = 0; i < columnCount; i++) {
                                    colgroup += '<col style="width:240px">';
                                }
                                
                                colgroup += '</colgroup>';
                                
                                $('.dataTables_scrollHead table colgroup').remove();
                                $('.dataTables_scrollBody table colgroup').remove();
                                headTable.prepend(colgroup);
                                bodyTable.prepend(colgroup);
                                
                                // if (headTable.find('colgroup').length === 0) {
                                    //     headTable.prepend(colgroup);
                                // }
                                
                                // console.log("< Body colGroupLen >",bodyTable.find('colgroup').length);
                                // if (bodyTable.find('colgroup').length === 0) {
                                //     bodyTable.prepend(colgroup);
                                // }
                                
                                
                                
                                setTimeout(function(){
                                    
                                    // enableResize();
                                    syncFilterWidths();
                                   

                                    api.columns.adjust().draw(false);
                                    
                                    
                                    const filterWidth = $('#tableFilters')[0].scrollWidth;
                                    let total = 0;
                                    const cols = $('.dataTables_scrollBody colgroup col');
                                
                                    cols.each(function(){
                                        total += $(this).width();
                                    });
                                    
                                    const ratio = filterWidth / total;
                                    cols.each(function(i){
                                        let w = $(this).width() * ratio;
                                    
                                        $('.dataTables_scrollHead colgroup col').eq(i).width(w);
                                        $('.dataTables_scrollBody colgroup col').eq(i).width(w);
                                    });
                                
                                    console.log("Scaled columns to:", filterWidth);

                                    // $('.dataTables_scrollHeadInner').css('width', filterWidth + 'px');
                                    // $('.dataTables_scrollHeadInner table').css('width', filterWidth + 'px');
// 
                                    // $('.dataTables_scrollBody').css('width', filterWidth + 'px');
                                    // $('.dataTables_scrollBody table').css('width', filterWidth + 'px');
                                    

                                    // console.log(
                                    //         "Filter:", filterWidth,
                                    //         "Head:", $('.dataTables_scrollHeadInner table').outerWidth(),
                                    //         "Body:", $('.dataTables_scrollBody table').outerWidth()
                                    // );
                                    
                                    console.log(
                                        "Filter:", $('#tableFilters')[0].scrollWidth,
                                        "Head:", $('.dataTables_scrollHeadInner table')[0].scrollWidth,
                                        "Body:", $('.dataTables_scrollBody table')[0].scrollWidth
                                    );
                    
                                                              
                                },100);

                        },
                        drawCallback: function () {
                            enableResize();
                            syncFilterWidths();
                        },
                        createdRow: function (row, data, dataIndex) {
                            // Make all cells editable except the ID column
                            if(!CAN_EDIT){
                                $(row).find('.delete-row-btn').each(function(){
                                    $(this).hide();
                                });
                                return
                            }
                            
                            $(row).find('td').each(function (colIndex) {

                                let columnName = selectedColumns[colIndex];

                                if (columnName !== "id" && columnName !== "Action" && columnName !== "assigned_to") {  // do not edit ID column
                                    $(this)
                                        .attr("contenteditable", "true")
                                        .addClass("editable-cell")
                                        .attr("data-field", columnName)
                                        .attr("data-id", data.id);
                                }
                            });
                            
                        }

                        
                    });

                    
                    
                    table.on("xhr", function () {

                        const json = table.ajax.json();
                        if (!json || !json.filter_options) return;

                        console.log("Updated Filter Options:", json.filter_options);

                        Object.entries(json.filter_options).forEach(([colName, values]) => {
                        
                            const colIndex = selectedColumns.indexOf(colName);
                            if (colIndex === -1) return;
                        
                            const dropdown = $('#excelFilterRow th')
                                .eq(colIndex)
                                .find('.checkbox-list');
                        
                            // Preserve already selected values
                            const selectedValues = dropdown
                                .find("input:checked")
                                .map((_, el) => el.value)
                                .get();
                        
                            dropdown.empty();
                        
                            values.forEach((val, i) => {
                                const safeVal = val === '' ? 'BLANK' : val;
                                const checked = selectedValues.includes(val);

                                const checkboxId = `filter_${colIndex}_${i}`;
                            
                                dropdown.append(`
                                    <div class="checkbox-item">
                                        <input class="column-filter"
                                               id="${checkboxId}"
                                               type="checkbox"
                                               value="${val}"
                                               data-col-index="${colIndex}"
                                               ${checked ? "checked" : ""}>
                                        <label for="${checkboxId}">${safeVal}</label>
                                    </div>
                                `);
                            });
                        });
                    });
                    //$("#headerRow").hide()

                    //console.log("After Append :",$('#headerRow').html());
                
                     
                // 🔹 Column-wise filtering
                $('#tableFilters table thead .column-filter').on('keyup change', function() {
                    const colIndex = $(this).parent().index();
                    console.log("COL Index Search : ",colIndex);
                    console.log("Search Value :",this.value);
                    table.column(colIndex).search(this.value).draw();
                });

                let drawCount = 0;
                table.on('draw', function () {
                        
                            
                        setTimeout(function(){

                            drawCount++;
                            if (drawCount < 2) return;
                            
                            const maxScroll = $('#tableFilters')[0].scrollWidth;
                        
                            $('.dataTables_scrollBody').css({
                                'max-width': maxScroll + 'px',
                                'overflow-x': 'auto'
                            });
                        
                            $('.dataTables_scrollHead').css({
                                'max-width': maxScroll + 'px'
                            });
                        
                            console.log(
                                "Max Scroll width :", maxScroll,
                                "Body:", $('.dataTables_scrollBody table').outerWidth(),
                                "Head:", $('.dataTables_scrollHeadInner table').outerWidth()
                            );
                            
                           
                            $('.dataTables_scrollHead thead th').each(function (i) {

                                    let w = $(this).outerWidth();

                                    $('.dataTables_scrollHead colgroup col').eq(i).css('width', w + 'px');
                                    $('.dataTables_scrollBody colgroup col').eq(i).css('width', w + 'px');

                            });

                            $(".select-row-btn").each(function () {
                                let id = $(this).data("id");
                                if (window.selectedRowIds.includes(id)) {

                                    $(this).removeClass("btn-outline-success")
                                    .addClass("btn-success")
                                    .html('<i class="bi bi-check-lg"></i>');

                                }
                            });

                    
                            syncFilterWidths();

                        },100);
                        
                         
                });
                
                $('deleteSelectedRows').hide();
                // console.log(
                //     `f-row len ${$('#dataTable thead tr:first th').length} dt-len ${$('#dataTable').DataTable().columns().count()}`
                // );

                console.log(
                    '_AFTER DT INIT → th:',
                    $('#dataTable thead tr:first th').length,
                    'dt:',
                    table.columns().count()
                );

                }, 0);

                setTimeout(function () {
                console.log("<< Adjust Draw Inside Table Render >>>");
                table.columns.adjust().draw();

                }, 500);

            }


            function updateField(rowId, field, value) {
                    
                $.ajax({
                        url: "/table/update_cell/",
                        method: "POST",
                        data: {
                            task_tableId:'{{table.id}}',
                            id: rowId,
                            field: field,
                            value: value,
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                        },
                        success: function (response) {
                            console.log("Updated successfully!");
                        },
                        error: function () {
                            alert("Failed to update!");
                        }
                });
            }

            $(document).on("blur", ".editable-cell", function () {
                    let newValue = $(this).text().trim();
                    let field = $(this).data("field");
                    let rowId = $(this).data("id");

                    console.log("Updating:", rowId, field, newValue);

                    updateField(rowId, field, newValue);
            });


            //TASK FEATURE JS
            $("#toggleTaskBtn").on("click", function () {
                    
                $("#taskDivId").slideToggle(400);
            });


            //SELECT ROW BUTTON EVENT 
            $(document).on("click", ".select-row-btn", function () {
                        
                        let rowId = $(this).data("id")
                        if (window.selectedRowIds.includes(rowId)) {
                            // Unselect
                            window.selectedRowIds = window.selectedRowIds.filter(id => id !== rowId);
                            $(this).removeClass("btn-success").addClass("btn-outline-success").html('<i class="bi bi-check-lg d-none"></i> Select');
                        } else {
                            // Select
                            window.selectedRowIds.push(rowId);
                            $(this).removeClass("btn-outline-success").addClass("btn-success").html('<i class="bi bi-check-lg"></i>');
                        }
                        
                        updateSelectionCount();
                        console.log("Selected IDs: ", window.selectedRowIds);
            });
            
            
            setTimeout(function () {
                console.log("<< Adjust Draw Work >>>");
                table.columns.adjust().draw();
            

            }, 500);

});

    
    </script>

{% endblock %}
