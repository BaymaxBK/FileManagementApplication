{% extends "base.html" %}

{% block title %} Request Attendance {% endblock %}


{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div style="width:100%; max-width:500px;">

        <!-- Back -->
        <div class="mb-3">
            <a href="{% url 'monthly_attendance' project.id %}" 
               class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Back
            </a>
        </div>

        <!-- Card -->
        <div class="card shadow-lg p-4">

            <div class="text-center mb-4">
                <h4 class="fw-bold">{{ project.display_name }}</h4>
                <p class="text-muted">Request Attendance Correction</p>
            </div>

            <form method="POST">
                {% csrf_token %}

                <!-- Date -->
                <div class="mb-3">
                    <label class="form-label">Select Date</label>
                    <input type="date" name="date" 
                           class="form-control"
                           value="{{ selected_date }}"
                           max="{{ today }}" required>
                </div>

                <!-- Status -->
                <div class="mb-3">
                    <label class="form-label">Requested Status</label>
                    <select name="status" class="form-select" required>
                        <option value="">-- Select --</option>
                        <option value="present">Present</option>
                        <option value="leave">Leave</option>
                    </select>
                </div>

                <!-- Reason -->
                <div class="mb-3">
                    <label class="form-label">Reason</label>
                    <textarea name="reason" rows="3" 
                              class="form-control" 
                              placeholder="Enter reason..." required></textarea>
                </div>

                <!-- Submit -->
                <button class="btn btn-dark w-100">
                    <i class="bi bi-send"></i> Submit Request
                </button>

            </form>

        </div>

    </div>
</div>
{% endblock %}
